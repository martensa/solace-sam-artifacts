apiVersion: v1
kind: ConfigMap
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-price-comparison-agent-config
data:
  price_comparison_agent.yaml: |
    log:
      stdout_log_level: INFO
      log_file_level: DEBUG
      log_file: price_comparison_agent.log

    apps:
      - name: price_comparison_agent_app
        app_base_path: .
        app_module: solace_agent_mesh.agent.sac.app
        broker:
          dev_mode: ${SOLACE_DEV_MODE, false}
          broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
          broker_username: ${SOLACE_BROKER_USERNAME, default}
          broker_password: ${SOLACE_BROKER_PASSWORD, default}
          broker_vpn: ${SOLACE_BROKER_VPN, default}
          temporary_queue: ${USE_TEMPORARY_QUEUES, true}
        app_config:
          namespace: ${NAMESPACE}
          supports_streaming: true
          agent_name: "PriceComparisonAgent"
          display_name: "Price Comparison Agent"
          model:
            model: "${LLM_SERVICE_GENERAL_MODEL_NAME}"
            api_base: "${LLM_SERVICE_ENDPOINT}"
            api_key: "${LLM_SERVICE_API_KEY}"
            timeout: 300
          instruction: |
            You are a professional price comparison assistant for procurement
            use cases. You operate as part of the Solace Agent Mesh alongside
            other specialized agents:

            - **EAN Search Agent**: Provides EAN numbers and product data
            - **Contract DB Agent**: Provides contract prices and supplier info
            - Additional specialized agents in the mesh

            Your primary task is to help facility managers (Objektleiter) and
            procurement staff with purchasing decisions by providing:
            - Fast price research via EAN barcode or product name
            - Identification of cheaper alternatives with savings potential
            - Supplier comparisons with price insights (min/max/median/spread)
            - Batch price comparisons for tender documents and RFQs
            - Contract price vs. market price analysis (renegotiation needs)
            - CSV export of comparison reports for award documentation

            RULES - follow strictly in this order:

            1. AUTO-DETECT INPUT TYPE.
               EAN: String of exactly 8, 12, 13, or 14 digits (spaces/hyphens
               allowed, strip before search).
               Product name/description: any other text.
               Never ask the user which type it is - detect automatically.

            2. ALWAYS USE TOOLS. NEVER INVENT DATA.
               All prices, merchants, and links must come from tool results.
               Never estimate, assume, or fabricate prices/availability.
               If no data returns: "Keine Ergebnisse gefunden - [reason]."

            3. CHOOSE THE RIGHT TOOL.
               - search_product_prices:       Default entry point for any price
                 search (EAN or product name). Supports quantity parameter.
               - find_cheaper_alternatives:   When cheaper alternatives are
                 requested AND reference product + price are known.
               - compare_suppliers:           When an explicit supplier comparison
                 or merchant ranking is requested.
               - batch_search_prices:         When multiple products need to be
                 searched simultaneously (tender documents, RFQs, product lists).
                 Supports "Qty x Product | Position" format.
               - compare_with_contract_price: When a contract price needs to be
                 checked against the current market price (renegotiation need).
                 Contract price may come from the Contract DB Agent.
               - export_comparison_report:    When a CSV report for documentation
                 or award memo is needed. The exported CSV is stored as an
                 artifact via the artifact_management tool group.
               Multiple tools may be called sequentially in one response.

            4. RETRY ON EMPTY RESULTS (max 3 attempts).
               If a tool returns no results, retry once with a simplified or
               broadened search query.
               After 3 failed attempts, explain what was tried and why it failed.

            5. PROACTIVELY SUGGEST ALTERNATIVES.
               After every successful price search, check if cheaper alternatives
               exist. If potential savings > 10%, automatically call
               find_cheaper_alternatives.

            6. HIGHLIGHT PRICE INSIGHTS.
               When price insights are included in results, display them
               prominently. If the price spread is large (>20%), point this out
               and give a recommendation.

            7. INTER-AGENT COMMUNICATION.
               When structured data (JSON) arrives from other agents (e.g., EAN
               from EAN Search Agent, contract prices from Contract DB Agent),
               use it directly as input for your own tools.
               All tool results contain a "structured" field with JSON data
               for other agents.

            8. RESPONSE FORMAT.
               - Sort all results by total price (price + shipping).
               - Show total price (incl. shipping) as the primary metric.
               - Highlight the cheapest option prominently.
               - Provide direct purchase links for each offer.
               - Use markdown tables for offer listings.
               - Aggregate identical merchants (show only best price).
               - Include price insights table (min/max/median/spread).
               - Keep text concise; let the tables carry the data.

            9. LANGUAGE.
               Respond in the language the user writes in.
               If not detectable: use German as default.
               Follow locale for price format: German = "XX,XX EUR".

            RECOMMENDED RESPONSE STRUCTURE:
              ## [Product name] - Price Comparison
              [Highlight cheapest offer]
              [Offer table: Merchant | Price | Shipping | Total | Link]
              ### Price Insights
              [Insights table: Min | Max | Median | Spread | Merchant count]
              ## Cheaper Alternatives (only if savings > 10%)
              [Alternatives table: Product | Brand | Price | Merchant | Savings | Link]

          tools:
            - tool_type: python
              component_module: "price_comparison_agent.tools"
              tool_config:
                enable_idealo: true
                enable_geizhals: true
                enable_google: true
                max_results_per_source: 5
                request_timeout: 15
                serpapi_key: "${SERPAPI_KEY}"
                scraper_proxy: "${SCRAPER_PROXY}"
                cache_ttl: 300

            - tool_type: builtin-group
              group_name: "artifact_management"

          session_service:
            type: "memory"
            default_behavior: "PERSISTENT"
          artifact_service:
            type: ${ARTIFACT_SERVICE_TYPE, s3}
            bucket_name: ${S3_BUCKET_NAME}
            endpoint_url: ${S3_ENDPOINT_URL}
            aws_region: ${AWS_REGION, us-east-1}
            artifact_scope: namespace
          artifact_handling_mode: reference
          enable_embed_resolution: ${ENABLE_EMBED_RESOLUTION, true}
          enable_artifact_content_instruction: ${ENABLE_ARTIFACT_CONTENT_INSTRUCTION, true}

          agent_card:
            description: >
              Professional price comparison for procurement use cases.
              Real-time price search across Idealo, Geizhals, and Google
              Shopping. Accepts EAN barcodes, product names, or free-text
              descriptions. Returns sorted offers from all available
              merchants including shipping costs, proactive alternative
              suggestions with savings potential, statistical price insights
              (min/max/median/spread), batch price comparisons for tender
              documents, contract-vs-market price analysis, and CSV export
              for award documentation. Supports quantity parameters and
              provides structured JSON data for inter-agent communication
              with EAN Search Agent, Contract DB Agent, and other agents.
            defaultInputModes: ["text"]
            defaultOutputModes: ["text", "file"]
            skills:
              - id: "price_search"
                name: "Product Price Search"
                description: >
                  Search current prices for a product by EAN barcode (8/13
                  digits) or product name. Returns all available offers sorted
                  by total price including shipping, with direct links, price
                  insights (min/max/median/spread), and optional quantity
                  calculation. Provides structured JSON data for other agents.
              - id: "alternative_finder"
                name: "Cheaper Alternative Finder"
                description: >
                  Find cheaper alternative products for a given reference
                  product. Returns alternatives sorted by price with absolute
                  and percentage savings. Supports quantity calculation for
                  total savings on larger orders.
              - id: "supplier_comparison"
                name: "Supplier Comparison"
                description: >
                  Compare all available merchants for a product. Returns a
                  ranking with unit price, shipping cost, total price,
                  delivery time, price insights, and direct links. Supports
                  quantity calculation.
              - id: "batch_search"
                name: "Batch Price Search"
                description: >
                  Search multiple products simultaneously - ideal for tender
                  documents (Leistungsverzeichnisse) and RFQs. Accepts comma-
                  or line-separated lists with optional quantity and position
                  label. Returns total cost overview.
              - id: "contract_price_comparison"
                name: "Contract Price vs. Market"
                description: >
                  Check a contract price against current market prices. Detects
                  renegotiation needs and evaluates whether contract terms are
                  still competitive. Can be combined with contract prices from
                  the Contract DB Agent.
              - id: "export_report"
                name: "CSV Export Report"
                description: >
                  Export a price comparison as a structured CSV report. Ideal
                  for award memos (Vergabevermerke), offer comparisons, and
                  procurement documentation.
          agent_card_publishing: { interval_seconds: 10 }
          agent_discovery: { enabled: true }
          inter_agent_communication:
            allow_list: ["*"]
            request_timeout_seconds: 120
