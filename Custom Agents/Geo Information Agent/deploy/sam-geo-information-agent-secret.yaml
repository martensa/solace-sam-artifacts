apiVersion: v1
kind: Secret
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-geo-information-agent-secret
type: Opaque
stringData:
  # Replace these placeholders with your actual base64-encoded values
  # You can generate them with: echo -n 'your-value' | base64
  LLM_SERVICE_ENDPOINT: "https://lite-llm.mymaas.net"
  LLM_SERVICE_API_KEY: "<Your Lite LLM API Key>"
  LLM_SERVICE_PLANNING_MODEL_NAME: "openai/claude-sonnet-4-6"
  LLM_SERVICE_GENERAL_MODEL_NAME: "openai/claude-sonnet-4-6"
  NAMESPACE: "sam-ent-k8s"
 
  # Local Kubernetes broker configuration
  # Base64 encoded values:
  # - ws://solace-broker-service:8008
  # - default -> ZGVmYXVsdA==
  # - admin -> YWRtaW4=
  SOLACE_BROKER_URL: "ws://host.docker.internal:8008"
  SOLACE_BROKER_VPN: "sam"
  SOLACE_BROKER_USERNAME: "default"
  SOLACE_BROKER_PASSWORD: "default"

  SOLACE_DEV_MODE: "false"
  LOGGING_CONFIG_PATH: "configs/logging_config.ini"

  #GEOCODING
  GEOCODING_API_KEY: "<Your Geocoding API Key>"
  