apiVersion: v1
kind: ConfigMap
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-geo-information-agent-config
data:
  # Note: For separation of concerns: 
  # Option 1: Use Kustomize to dynamically generate the config map from local files. 
  # Option 2: Use volumes to mount files into ConfigMap
  logging_config.ini: |
    [loggers]
    keys=root,LiteLLM,py_warnings,solace_ai_connector,uvicorn,uvicorn_error,uvicorn_access
    [handlers]
    keys=streamHandler,rotatingFileHandler
    [formatters]
    keys=simpleFormatter
    [logger_root]
    level=DEBUG
    handlers=streamHandler,rotatingFileHandler
    qualname=root
    [handler_streamHandler]
    class=StreamHandler
    level=INFO
    formatter=simpleFormatter
    args=(sys.stdout,)
    [logger_LiteLLM]
    level=DEBUG
    handlers=streamHandler,rotatingFileHandler
    qualname=LiteLLM
    propagate=0
    [logger_py_warnings]
    level=WARNING
    handlers=streamHandler,rotatingFileHandler
    qualname=py.warnings
    propagate=0
    [logger_solace_ai_connector]
    level=DEBUG
    handlers=streamHandler,rotatingFileHandler
    qualname=solace_ai_connector
    propagate=0
    [logger_uvicorn]
    level=DEBUG
    handlers=streamHandler,rotatingFileHandler
    qualname=uvicorn
    propagate=0
    [logger_uvicorn_error]
    level=INFO
    handlers=streamHandler,rotatingFileHandler
    qualname=uvicorn.error
    propagate=0
    [logger_uvicorn_access]
    level=INFO
    handlers=streamHandler,rotatingFileHandler
    qualname=uvicorn.access
    propagate=0
    [handler_rotatingFileHandler]
    class=logging.handlers.RotatingFileHandler
    level=DEBUG
    formatter=simpleFormatter
    args=('sam.log', 'a', 52428800, 10)
    [formatter_simpleFormatter]
    format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
  shared_config.yaml: |
    shared_config:
      - broker_connection: &broker_connection
          dev_mode: ${SOLACE_DEV_MODE, false}
          broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
          broker_username: ${SOLACE_BROKER_USERNAME, default}
          broker_password: ${SOLACE_BROKER_PASSWORD, default}
          broker_vpn: ${SOLACE_BROKER_VPN, default}
          temporary_queue: ${USE_TEMPORARY_QUEUES, true}
      - models:
        planning: &planning_model
          model: ${LLM_SERVICE_PLANNING_MODEL_NAME}
          api_base: ${LLM_SERVICE_ENDPOINT}
          api_key: ${LLM_SERVICE_API_KEY}
        general: &general_model
          model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
          api_base: ${LLM_SERVICE_ENDPOINT}
          api_key: ${LLM_SERVICE_API_KEY}
        image_gen: &image_generation_model
          model: ${IMAGE_MODEL_NAME}
          api_base: ${IMAGE_SERVICE_ENDPOINT}
          api_key: ${IMAGE_SERVICE_API_KEY}
        report_gen: &report_generation_model
          model: ${LLM_REPORT_MODEL_NAME}
          api_base: ${LLM_SERVICE_ENDPOINT}
          api_key: ${LLM_SERVICE_API_KEY}
        multimodal: &multimodal_model  "gemini-2.5-flash-preview-04-17"
        gemini_pro: &gemini_pro_model "gemini-2.5-pro-exp-03-25"
      - services:
        session_service: &default_session_service
          type: "memory"
          default_behavior: "PERSISTENT"
        artifact_service: &default_artifact_service
          type: "filesystem"
          base_path: "/tmp/samv2"
          artifact_scope: namespace
        data_tools_config: &default_data_tools_config
          sqlite_memory_threshold_mb: 100
          max_result_preview_rows: 50
          max_result_preview_bytes: 4096
  geo_information_agent.yaml: |
    log: 
      stdout_log_level: INFO
      log_file_level: DEBUG
      log_file: geo_information_agent.log

    # To use the `shared_config.yaml` file, uncomment the following line and remove the `shared_config` section below.
    !include ../shared_config.yaml

    apps:
      - name: geo-information-agent-app
        app_base_path: . 
        app_module: solace_agent_mesh.agent.sac.app 
        broker:
          <<: *broker_connection

        app_config:
          namespace: ${NAMESPACE} 
          supports_streaming: true 
          agent_name: "GeoInformationAgent" 
          display_name: "Geo Information Agent" 
          model: *general_model 

          instruction: |
            You are a helpful assistant with expertise in geographic information.
            You can convert city names to coordinates, find timezone information, and get weather forecasts.

          tools:
            - tool_type: python
              component_module: sam_geo_information
              function_name: city_to_coordinates
              tool_config:
                geocoding_api_key: ${GEOCODING_API_KEY}

            - tool_type: python
              component_module: sam_geo_information
              function_name: city_to_timezone
              tool_config:
                geocoding_api_key: ${GEOCODING_API_KEY}

            - tool_type: python
              component_module: sam_geo_information
              function_name: get_weather
              tool_config:
                geocoding_api_key: ${GEOCODING_API_KEY}
                weather_api_key: ${WEATHER_API_KEY}

          session_service: *default_session_service
          artifact_service: *default_artifact_service

          artifact_handling_mode: "embed"
          enable_embed_resolution: true
          enable_artifact_content_instruction: true

          agent_card:
            description: "A plugin that provides comprehensive geographic information services including location, timezone, and weather data"
            defaultInputModes: ["text"]
            defaultOutputModes: ["text"]
            skills:
              - id: "city_to_coordinates"
                name: "city_to_coordinates"
                description: "Convert a city name to its geographic coordinates."
              - id: "city_to_timezone"
                name: "city_to_timezone"
                description: "Convert a city name to its timezone information."
              - id: "get_weather"
                name: "get_weather"
                description: "Get current weather conditions and forecast for a location."

          agent_card_publishing: { interval_seconds: 10 }
          agent_discovery: { enabled: false }
          inter_agent_communication:
            allow_list: []
            request_timeout_seconds: 30