apiVersion: v1
kind: ConfigMap
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-ean-search-agent-config
data:
  ean_search_agent.yaml: |
    log:
      stdout_log_level: INFO
      log_file_level: DEBUG
      log_file: ean_search_agent.log

    apps:
      - name: ean_search_agent_app
        app_base_path: .
        app_module: solace_agent_mesh.agent.sac.app
        broker:
          dev_mode: ${SOLACE_DEV_MODE, false}
          broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
          broker_username: ${SOLACE_BROKER_USERNAME, default}
          broker_password: ${SOLACE_BROKER_PASSWORD, default}
          broker_vpn: ${SOLACE_BROKER_VPN, default}
          temporary_queue: ${USE_TEMPORARY_QUEUES, true}
        app_config:
          namespace: ${NAMESPACE}
          supports_streaming: true
          agent_name: "EANSearchAgent"
          display_name: "EAN Search Agent"
          model:
            model: "${LLM_SERVICE_GENERAL_MODEL_NAME}"
            api_base: "${LLM_SERVICE_ENDPOINT}"
            api_key: "${LLM_SERVICE_API_KEY}"
            timeout: 300
          instruction: |
            You are a procurement EAN/barcode lookup assistant. Find EAN
            barcodes quickly. Only use tools from your tool list.

            ## Search Strategy
            Goal: fast results, max 2 API calls per request, sequential only.

            1. Numeric EAN/UPC/GTIN → ean_barcode_lookup (1 call, fastest).
            2. Product name → ean_product_search with a SHORT query that
               includes the brand in the name field.
               Example: "OSRAM LED Star Classic A60 9W E27"
               → name="OSRAM LED A60 9W E27"
               Never use the brand filter parameter (unreliable).
            3. Zero results → retry ONCE with shorter terms
               (e.g. "OSRAM LED A60" or "OSRAM A60"), then stop.
            4. Skip ean_category_search unless the user asks for it.

            ## Rate Limits
            On "Rate limit exceeded": stop all API calls immediately.
            Return any results you already have. Do not delegate to
            peer agents. Inform user the daily quota is exhausted.

            ## Free Tools (no quota)
            - ean_issuing_country: GS1 registration country (not
              manufacturing country — clarify this to users).
            - ean_verify_checksum: local EAN validation.

            ## Output Format
            1. Start: "Found X EANs for '<query>'"
            2. Markdown table: EAN | Product Name | Brand | Category
            3. Show ALL results from tools — database names often differ
               from the query (e.g. "Osram E27 Edison Screw Led Classic
               Shape A60 Bulb, 9w" matches "OSRAM LED Star Classic A60").
               Label non-exact matches as "similar products found".
            4. >15 results: group by brand or category.
            5. Truncated results: tell user, suggest narrower search.
            6. Respond in the user's language.

            ## Error Handling
            - Tool returns "error" with "hint" → show the hint.
            - total_results: 0 → say so, suggest alternative terms.
            - Quota exhausted → advise trying tomorrow or upgrading.

            ## Rules
            - Never invent EAN numbers.
            - Never filter out or hide tool results.
            - Never say "I cannot provide the exact EAN". If tools
              returned results, present them all — user decides.
            - Never pass a product name to ean_barcode_lookup.
            - Never delegate to peers when rate-limited.
            - Never call API tools in parallel.
            - Never use the brand filter parameter.
          tools:
            - tool_type: mcp
              connection_params:
                type: stdio
                command: "uv"
                args:
                  - --directory
                  - /opt/ean-search-mcp-server/
                  - run
                  - /opt/ean-search-mcp-server/ean_search_mcp_server.py
              environment_variables:
                EAN_SEARCH_MAX_RETRIES: "${EAN_SEARCH_MAX_RETRIES}"
                EAN_SEARCH_RETRY_BACKOFF: "${EAN_SEARCH_RETRY_BACKOFF}"
                EAN_DATABASE_BACKEND: "${EAN_DATABASE_BACKEND}"
                EAN_SEARCH_API_TOKEN: "${EAN_SEARCH_API_TOKEN}"
                EAN_SEARCH_API_BASE: "${EAN_SEARCH_API_BASE}"
                EAN_SEARCH_MAX_PAGES: "${EAN_SEARCH_MAX_PAGES}"
                EAN_SEARCH_LANGUAGE: "${EAN_SEARCH_LANGUAGE}"
                EAN_SEARCH_TIMEOUT: "${EAN_SEARCH_TIMEOUT}"
                EAN_SEARCH_MIN_INTERVAL: "${EAN_SEARCH_MIN_INTERVAL}"
                UPCITEMDB_API_BASE: "${UPCITEMDB_API_BASE}"
                UPCITEMDB_API_KEY: "${UPCITEMDB_API_KEY}"
                EAN_CACHE_TTL: "${EAN_CACHE_TTL}"
                MCP_MAX_RESPONSE_CHARS: "${MCP_MAX_RESPONSE_CHARS}"
                MCP_LOG_LEVEL: "${MCP_LOG_LEVEL}"
                MCP_LOG_FILE: "${MCP_LOG_FILE}"

            - tool_type: builtin-group
              group_name: "artifact_management"

          session_service:
            type: "memory"
            default_behavior: "PERSISTENT"
          artifact_service:
            type: ${ARTIFACT_SERVICE_TYPE, s3}
            bucket_name: ${S3_BUCKET_NAME}
            endpoint_url: ${S3_ENDPOINT_URL}
            aws_region: ${AWS_REGION, us-east-1}
            artifact_scope: namespace
          artifact_handling_mode: reference
          enable_embed_resolution: ${ENABLE_EMBED_RESOLUTION, true}
          enable_artifact_content_instruction: ${ENABLE_ARTIFACT_CONTENT_INSTRUCTION, true}

          agent_card:
            description: >
              Procurement-focused EAN/UPC/GTIN barcode lookup agent. Finds
              matching barcodes for product names or descriptions using a
              configurable database backend. Capabilities: product name
              search with auto-pagination, single barcode lookup, category-
              scoped search, EAN checksum validation, and GS1 issuing-country
              lookup. Additional backend-specific features may include fuzzy
              search and manufacturer prefix search. Optimized for speed
              with response caching and quota-aware sequential API usage.
            defaultInputModes: ["text"]
            defaultOutputModes: ["text", "file"]
            skills:
              - id: "ean_product_search"
                name: "Product EAN Search"
                description: >
                  Find EAN/UPC barcodes by product name. Include brand in
                  the search term for best results. Auto-paginates and
                  deduplicates. Returns matching and similar products.
              - id: "ean_category_search"
                name: "Category Search"
                description: >
                  Search for barcodes within a product category (e.g.
                  Office Supplies, Electronics). Use only when category
                  is explicitly specified.
              - id: "ean_barcode_lookup"
                name: "Barcode Lookup"
                description: >
                  Look up a product by its numeric EAN/UPC/GTIN barcode.
                  Returns product name, category, and metadata. Fastest
                  lookup method — single API call.
              - id: "ean_validation"
                name: "EAN Validation"
                description: >
                  Validate EAN/UPC check digits and look up GS1 registration
                  countries. Local operations, zero API cost — suitable
                  for bulk validation.
              - id: "artifact_management"
                name: "Artifact Management"
                description: "List, read, create, update, and delete artifacts."
          agent_card_publishing: { interval_seconds: 10 }
          agent_discovery: { enabled: true }
          inter_agent_communication:
            allow_list: ["*"]
            request_timeout_seconds: 60
