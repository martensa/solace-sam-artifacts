apiVersion: v1
kind: Secret
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-ean-search-agent-secret
type: Opaque
stringData:
  # Must match your cluster / existing agent envs
  NAMESPACE: "sam-ent-k8s"

  # ---------------------------------------------------------------------------
  # Artifact storage (S3-compatible)
  # ---------------------------------------------------------------------------
  S3_BUCKET_NAME: "sam-ent-local"
  S3_ENDPOINT_URL: "http://agent-mesh-seaweedfs-0.agent-mesh-seaweedfs.sam-ent-k8s.svc.cluster.local:8333"
  AWS_ACCESS_KEY_ID: "sam-ent-local"
  AWS_SECRET_ACCESS_KEY: "sam-ent-local"
  AWS_REGION: "us-east-1"

  # ---------------------------------------------------------------------------
  # LLM configuration
  # Supported via LiteLLM proxy -- set model name with provider prefix.
  # Recommended:
  #   Claude / Gemini: ENABLE_EMBED_RESOLUTION=true  (large context, fast)
  #   GPT-4o / GPT-5:  ENABLE_EMBED_RESOLUTION=false (reduce prompt size)
  # ---------------------------------------------------------------------------
  LLM_SERVICE_ENDPOINT: "https://lite-llm.mymaas.net"
  LLM_SERVICE_API_KEY: ""
  #LLM_SERVICE_GENERAL_MODEL_NAME: "openai/gemini-2.5-pro"
  #LLM_SERVICE_GENERAL_MODEL_NAME: "openai/gpt-4o"
  LLM_SERVICE_GENERAL_MODEL_NAME: "openai/claude-opus-4-6"

  # Artifact content injection into LLM context.
  # Recommended: true for Claude/Gemini, false for GPT (avoids prompt timeouts).
  ENABLE_EMBED_RESOLUTION: "true"
  ENABLE_ARTIFACT_CONTENT_INSTRUCTION: "true"

  # ---------------------------------------------------------------------------
  # Solace Event Broker
  # ---------------------------------------------------------------------------
  SOLACE_BROKER_URL: "ws://host.docker.internal:8008"
  SOLACE_BROKER_VPN: "default"
  SOLACE_BROKER_USERNAME: "default"
  SOLACE_BROKER_PASSWORD: "default"
  SOLACE_DEV_MODE: "false"

  # ---------------------------------------------------------------------------
  # Database backend selection
  # ---------------------------------------------------------------------------
  # Choose which barcode database to use:
  #   "upcitemdb"  -- UPCitemdb (687M+ products, free tier: 100 req/day)
  #   "ean_search" -- ean-search.org (1B+ barcodes, requires API token)
  EAN_DATABASE_BACKEND: "upcitemdb"

  # ---------------------------------------------------------------------------
  # ean-search.org settings (only when EAN_DATABASE_BACKEND=ean_search)
  # ---------------------------------------------------------------------------
  # Get your API token from: https://www.ean-search.org/ean-database-api.html
  # Plans: Trial (100/mo free), Pro (5K/mo 19 EUR), Bronze-Gold (50K-300K/mo)
  EAN_SEARCH_API_TOKEN: ""
  EAN_SEARCH_API_BASE: "https://api.ean-search.org/api"

  # Language filter: 1=English, 2=French, 3=German, 4=Spanish,
  # 5=Portuguese, 6=Italian, 7=Dutch, 8=Polish, 9=Swedish,
  # 10=Turkish, 99=any language.
  EAN_SEARCH_LANGUAGE: "1"

  # ---------------------------------------------------------------------------
  # UPCitemdb settings (only when EAN_DATABASE_BACKEND=upcitemdb)
  # ---------------------------------------------------------------------------
  # Free tier: no key needed. For paid plans, set key and change base URL.
  # Plans: Explorer (100/day free), DEV ($99/mo), PRO ($699/mo)
  UPCITEMDB_API_BASE: "https://api.upcitemdb.com/prod/trial"
  UPCITEMDB_API_KEY: ""

  # ---------------------------------------------------------------------------
  # Shared settings
  # ---------------------------------------------------------------------------
  # Max pages to auto-paginate (each page ~10 results).
  # Recommended: 10 for ean_search, 5 for upcitemdb free tier.
  EAN_SEARCH_MAX_PAGES: "5"

  # API request timeout in seconds
  EAN_SEARCH_TIMEOUT: "30"

  # Min interval between API requests in seconds (rate limiting)
  # Recommended: 0.5 for ean_search, 1.0 for upcitemdb free tier.
  EAN_SEARCH_MIN_INTERVAL: "1.0"

  # Retry on transient 5xx / connection errors (0 = no retries)
  EAN_SEARCH_MAX_RETRIES: "1"
  EAN_SEARCH_RETRY_BACKOFF: "2.0"

  # Hard character cap on tool responses returned to the LLM.
  # Recommended: 25000 for Claude/Gemini, 10000 for GPT
  MCP_MAX_RESPONSE_CHARS: "25000"
  MCP_LOG_LEVEL: "INFO"
  MCP_LOG_FILE: "ean_search_mcp_server.log"
