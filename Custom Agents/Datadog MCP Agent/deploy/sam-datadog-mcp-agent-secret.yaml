apiVersion: v1
kind: Secret
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-datadog-mcp-agent-secret
type: Opaque
stringData:
  # -- SAM namespace (must match your cluster)--
  NAMESPACE: "sam-ent-k8s"

  # -- Artifact storage (S3-compatible)--
  S3_BUCKET_NAME: "sam-ent-local"
  S3_ENDPOINT_URL: "http://agent-mesh-seaweedfs-0.agent-mesh-seaweedfs.sam-ent-k8s.svc.cluster.local:8333"
  AWS_ACCESS_KEY_ID: "sam-ent-local"
  AWS_SECRET_ACCESS_KEY: "sam-ent-local"
  AWS_REGION: "us-east-1"

  # -- LLM service--
  LLM_SERVICE_ENDPOINT: "https://lite-llm.mymaas.net"
  LLM_SERVICE_API_KEY: "<Your Lite-LLM API Key>"
  # Recommended: Gemini 2.5 Pro or Claude for 73 tools (large tool sets).
  # GPT models may need the read-only tool subset below.
  #LLM_SERVICE_GENERAL_MODEL_NAME: "openai/azure-gpt-5"
  LLM_SERVICE_GENERAL_MODEL_NAME: "openai/gemini-2.5-pro"
  #LLM_SERVICE_GENERAL_MODEL_NAME: "openai/claude-3-5-sonnet-v2"

  # -- Solace broker connectivity--
  SOLACE_BROKER_URL: "ws://host.docker.internal:8008"
  SOLACE_BROKER_VPN: "default"
  SOLACE_BROKER_USERNAME: "default"
  SOLACE_BROKER_PASSWORD: "default"
  SOLACE_DEV_MODE: "false"

  # -- Datadog API credentials--
  # Get these from https://app.datadoghq.com/organization-settings/api-keys
  DD_API_KEY: "<Your Datadog API Key>"
  DD_APP_KEY: "<Your Datadog Application Key>"
  # Datadog site: datadoghq.com (US1), datadoghq.eu (EU1), us3.datadoghq.com (US3),
  #              us5.datadoghq.com (US5), ap1.datadoghq.com (AP1), ddog-gov.com (Gov)
  DD_SITE: "datadoghq.com"

  # -- Artifact content injection--
  # When true, artifact content is embedded into the LLM prompt.
  # Set both to "false" for GPT to reduce prompt size and avoid timeouts.
  # Recommended: true for Claude/Gemini, false for GPT.
  #ENABLE_EMBED_RESOLUTION: "false"
  #ENABLE_ARTIFACT_CONTENT_INSTRUCTION: "false"

  # -- GPT-optimised read-only tool subset (~40 tools)--
  # GPT models degrade above ~50 tools. Uncomment below to limit to observation
  # and analysis tools only. Claude and Gemini handle all 73 tools fine.
  # To enable: uncomment and set in the ConfigMap's environment_variables section
  # as MCP_TOOL_ALLOW_LIST, or use the allow_list in the agent YAML.
  #
  # Read-only tools (OBSERVE + ANALYZE + read ALERT/RESPOND/REVIEW):
  # query_metrics, list_metrics, get_metric_metadata, list_metric_tags,
  # search_logs, aggregate_logs, list_log_indexes,
  # search_spans, aggregate_spans,
  # list_rum_applications, search_rum_events, aggregate_rum_events,
  # search_events, list_hosts, get_host_totals, get_host_tags,
  # list_containers, list_container_images, list_processes,
  # get_network_connections, get_network_dns,
  # search_ci_pipeline_events, aggregate_ci_pipelines,
  # search_security_signals, get_security_signal, search_audit_logs,
  # list_services, get_service_definition, get_service_dependencies,
  # list_dashboards, get_dashboard, get_graph_snapshot,
  # list_notebooks, get_notebook,
  # search_error_tracking_issues, get_service_health,
  # list_monitors, get_monitor, list_slos, get_slo, get_slo_history,
  # list_synthetics_tests, get_synthetics_test, get_synthetics_results,
  # list_incidents, get_incident, list_downtimes,
  # list_oncall_schedules, get_current_oncall,
  # list_teams, list_workflows,
  # get_usage_summary, get_estimated_cost, get_hourly_usage
