apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: sam-ent-k8s
data:
  settings.yml: |
    use_default_settings: true

    general:
      instance_name: "SAM SearXNG"
      debug: false

    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key: "sam-searxng-secret-key-change-in-prod"
      # Disable rate limiting for internal use
      limiter: false

    search:
      safe_search: 0
      default_lang: "de"
      formats:
        - html
        - json

    # Enable the engines most relevant for B2B product search
    engines:
      # Google - primary, best quality
      - name: google
        engine: google
        shortcut: g
        disabled: false
        weight: 1.2

      # Bing - good secondary
      - name: bing
        engine: bing
        shortcut: b
        disabled: false
        weight: 1.0

      # DuckDuckGo - fallback
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: false
        weight: 0.8

      # Google (German) - for B2B electrical products
      - name: google de
        engine: google
        shortcut: gde
        disabled: false
        use_mobile_ui: false
        language: de
        weight: 1.1

    outgoing:
      # Connection pool for upstream search engines
      request_timeout: 8
      max_request_timeout: 15
      pool_connections: 100
      pool_maxsize: 20
