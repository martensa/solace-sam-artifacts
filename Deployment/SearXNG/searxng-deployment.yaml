apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: sam-ent-k8s
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            # Override SEARXNG_PORT to prevent K8s service env var collision
            - name: SEARXNG_PORT
              value: "8080"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
            - name: searxng-data
              mountPath: /etc/searxng
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /config/settings.yml /etc/searxng/settings.yml
          volumeMounts:
            - name: config
              mountPath: /config/settings.yml
              subPath: settings.yml
            - name: searxng-data
              mountPath: /etc/searxng
      volumes:
        - name: config
          configMap:
            name: searxng-config
        - name: searxng-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: sam-ent-k8s
  labels:
    app: searxng
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
