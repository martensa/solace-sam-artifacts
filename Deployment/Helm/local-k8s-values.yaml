# SAM Core Configuration
sam:
  communityMode: false

  # Authentication and authorization configuration
  # When enabled, SAM will enforce RBAC authorization
  # When disabled (for dev/quickstart), all users have admin access
  authorization:
    enabled: false

  # Use localhost for local development
  dnsName: "localhost"

  # Session secret (you can use any string for local dev)
  sessionSecretKey: "s6iRVUVvTsAkXCcWyedhFE6d4wLCw0ZA"

  # OIDC disabled - leave issuer empty to skip authentication
  oauthProvider:
    oidc:
      issuer: ""  # Empty issuer disables OIDC authentication
      clientId: ""
      clientSecret: ""
  
  # Optional URL overrides for local development (e.g., kubectl port-forward)
  # Leave empty to use auto-computed URLs based on ingress/service configuration
  frontendServerUrl: ""    # Override computed frontend URL
  platformServiceUrl: ""   # Override computed platform API URL

  cors:
    allowedOriginRegex: ""

  taskLogging:
    enabled: true
    logStatusUpdates: true
    logArtifactEvents: false
    logFileParts: true
    maxFilePartSizeBytes: 10240
    hybridBuffer:
      enabled: true
      flushThreshold: 10

# Solace Broker Configuration
broker:
  url: "ws://host.docker.internal:8008" # TODO: Replace with your local/remote broker URL
  clientUsername: "default" # TODO: Replace with your broker username
  password: "default" # TODO: Replace with your broker password
  vpn: "sam" # TODO: Replace with your VPN name

# LLM Service Configuration
llmService:
  planningModel: "openai/claude-opus-4-6" # TODO: Replace with your model
  generalModel: "openai/claude-opus-4-6" # TODO: Replace with your model
  reportModel: "openai/claude-sonnet-4-6" # TODO: Replace with your model
  imageModel: "openai/azure-dalle-3" # TODO: Replace with your model
  transcriptionModel: "openai/whisper" # TODO: Replace with your model
  llmServiceEndpoint: "https://lite-llm.mymaas.net" # TODO: Replace with your LLM endpoint
  llmServiceApiKey: "<Your Lite LLM API Key>" # TODO: Replace with your API key

environmentVariables: {}

# Kubernetes Service Configuration
service:
  type: ClusterIP  # ClusterIP for local development
  annotations: {}
  tls:
    enabled: false  # No TLS for local development
    passphrase: ""

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    cert-manager.io/cluster-issuer: "solace-ca-clusterissuer"
  autoConfigurePaths: true
  host: "localhost"
  tls:
    - secretName: sam-tls
      hosts:
        - localhost

# Persistence Configuration
# Uses bundled PostgreSQL and SeaweedFS for local development
global:
  persistence:
    enabled: true
    namespaceId: "sam-ent-local" # Unique namespace for local dev

# SAM Deployment Configuration
samDeployment:
  serviceAccount:
    name: solace-agent-mesh-sa
    annotations: {}

  # No image pull secret needed for local dev if images are public
  # or if you're using minikube's docker daemon
  imagePullSecret: "localhost-registry-secret"

  # Main SAM Image
  image:
    repository: localhost:5000/solace-agent-mesh-enterprise
    tag: 1.97.2
    pullPolicy: Always  # Use IfNotPresent to avoid pulling on every restart

  # Agent Deployer image
  agentDeployer:
    image:
      repository: localhost:5000/sam-agent-deployer
      tag: 1.7.0
      pullPolicy: Always
    version: "k8s-1.2.4"
    # Chart repository base URL for deploying agents and gateways
    chartBaseUrl: "https://solaceproducts.github.io/solace-agent-mesh-helm-quickstart"
    # Chart version for the unified sam-agent chart (used for both agents and gateways)
    chartVersion: "1.2.4"
    localCharts:
      enabled: false

  rollout:
    rollingUpdate: {}
    strategy: RollingUpdate

dataStores:
  objectStorage:
    workloadIdentity:
      enabled: false
