# Solace Agent Mesh  - Datadog MCP Agent Configuration (v1.0)
#
# 73 tools across 25 modules organized around the SRE operational lifecycle:
# OBSERVE > ANALYZE > ALERT > RESPOND > REVIEW
#
# Prerequisites:
#   1. Install:  pip install . (or: uv venv && uv pip install .)
#   2. Set env:  DD_API_KEY, DD_APP_KEY, DD_SITE
#   3. Run:      sam run sam/datadog_agent.yaml

agent:
  name: datadog-monitor
  description: >
    Datadog monitoring and observability agent. Query metrics, logs, traces,
    and RUM data. Inspect hosts, containers, processes, and network flows.
    Analyze service health (Four Golden Signals), dashboards, and errors.
    Manage monitors, SLOs, and synthetic tests. Handle incidents, downtimes,
    and on-call. Trigger workflows. Review usage and costs.

  # -- Option A: Local stdio transport (recommended for development)--
  tools:
    - tool_type: mcp
      connection_params:
        type: stdio
        command: "datadog-mcp-server"
        # Or with uv:
        # command: "uv"
        # args: ["run", "datadog-mcp-server"]
      environment_variables:
        DD_API_KEY: "${DD_API_KEY}"
        DD_APP_KEY: "${DD_APP_KEY}"
        DD_SITE: "${DD_SITE}"

  # -- Option B: Remote streamable-http transport--
  # tools:
  #   - tool_type: mcp
  #     connection_params:
  #       type: streamable-http
  #       url: "https://your-datadog-mcp-host:8080/mcp/message"
  #       headers:
  #         Authorization: "Bearer ${MCP_AUTH_TOKEN}"

