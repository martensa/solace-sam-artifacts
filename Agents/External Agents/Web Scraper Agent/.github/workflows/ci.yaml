name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install playwright

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_integration.py

      - name: Check ASCII-only in source files
        run: |
          if LC_ALL=C grep -rn '[^[:print:][:space:]]' src/ deploy/ README.md; then
            echo "Non-ASCII characters found in source files"
            exit 1
          fi

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install playwright
          playwright install chromium --with-deps

      - name: Run integration tests
        run: pytest tests/test_integration.py -v --tb=short
