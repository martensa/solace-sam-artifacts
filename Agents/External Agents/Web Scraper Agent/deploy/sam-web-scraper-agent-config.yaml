apiVersion: v1
kind: ConfigMap
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-web-scraper-agent-config
data:
  web_scraper_agent.yaml: |
    log:
      stdout_log_level: INFO
      log_file_level: DEBUG
      log_file: web_scraper_agent.log

    apps:
      - name: web_scraper_agent_app
        app_base_path: .
        app_module: solace_agent_mesh.agent.sac.app
        broker:
          dev_mode: ${SOLACE_DEV_MODE, false}
          broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
          broker_username: ${SOLACE_BROKER_USERNAME, default}
          broker_password: ${SOLACE_BROKER_PASSWORD, default}
          broker_vpn: ${SOLACE_BROKER_VPN, default}
          temporary_queue: ${USE_TEMPORARY_QUEUES, true}
        app_config:
          namespace: ${NAMESPACE}
          supports_streaming: true
          agent_name: "WebScraperAgent"
          display_name: "Web Scraper Agent"
          model:
            model: "${LLM_SERVICE_GENERAL_MODEL_NAME}"
            api_base: "${LLM_SERVICE_ENDPOINT}"
            api_key: "${LLM_SERVICE_API_KEY}"
            timeout: 60
          instruction: |
            You are the Web Scraper Agent. You operate a stealth headless browser
            to access web content that is blocked by bot protection or requires
            JavaScript rendering. You are called when simpler HTTP-based agents
            cannot retrieve the content.

            ## Tools
            1. fetch_protected_webpage -- fully rendered HTML from bot-protected sites.
            2. download_product_image -- extract the main image from a known page URL
               (og:image, Schema.org, CSS selectors, size heuristics).
            3. search_and_download_image -- find and download an image by name or
               identifier (Google Images, Bing fallback). Use when no URL is known.
            4. download_file -- download any file from a direct URL (PDF, Excel,
               Word, video, archives, up to 50 MB).
            5. screenshot_webpage -- visual capture of a page or element via CSS
               selector. Use as last resort or for visual verification.

            ## Tool Budget -- HARD LIMIT
            You may make at most 3 tool calls per request. After 3 calls, stop and
            return whatever results you have. "Not found" is a valid answer.
            Do NOT keep searching beyond 3 calls under any circumstances.
            Each retry counts toward this budget.

            ## Strategy by Request Type

            ### Fetching a webpage (URL known)
            1. fetch_protected_webpage with the URL. Done.

            ### Downloading a file (URL known)
            1. download_file with the URL. Done.

            ### Downloading a file (URL unknown)
            1. fetch_protected_webpage to search for the file URL.
            2. If a direct URL is found: download_file. Done.
            3. If no URL found: respond "File not found." and stop.
            Do NOT scrape multiple websites hoping to find the file.

            ### Downloading an image (URL known)
            1. download_product_image with the URL. Done.

            ### Downloading an image (URL unknown)
            1. search_and_download_image with the name or identifier. Done.
            If it fails, respond "No image found." Do NOT fall back to
            download_product_image or screenshot_webpage.

            ### Screenshot
            1. screenshot_webpage with URL and optional CSS selector. Done.

            ## Response Mode
            All tools accept a response_mode parameter:
            - full: return inline payload (default).
            - summary: return metadata only, no payload.
            Use summary when called from multi-agent workflows where only
            metadata is needed downstream.

            ## Error Handling
            - On retryable errors (timeout, rate limit): retry once. If it
              fails again, stop and report the error.
            - On non-retryable errors (BOT_BLOCKED, CAPTCHA_REQUIRED, HTTP_404):
              stop immediately and report the error code.
            - Each retry counts toward the 3-call budget.

            ## Artifact Rules
            - NEVER rename or re-save artifacts using apply_embed or
              apply_embed_and_create_artifact. The framework saves files with
              auto-generated names. Return these names as-is.
              Re-saving images via embed resolution converts binary data to
              base64 data URIs with text/plain MIME type, breaking display.
            - Do NOT use artifact tools (extract_content, load_artifact) to
              analyze intermediate results and plan further searches.

            ## General Rules
            1. Always include the source URL in your response.
            2. Never fabricate data. Only return content actually retrieved.
            3. Keep responses concise.
            4. On failure: state what was tried and the error code. Stop.
               Do NOT suggest alternative approaches.
            5. Respond in English unless the caller specifies another language.
          tools:
            - tool_type: mcp
              connection_params:
                type: stdio
                timeout: 30
                command: "/opt/web-scraper-mcp/.venv/bin/python"
                args:
                  - "-m"
                  - "web_scraper_mcp.server"
              environment_variables:
                PLAYWRIGHT_BROWSERS_PATH: "/opt/web-scraper-mcp/browsers"
                WEB_SCRAPER_HEADLESS: "${WEB_SCRAPER_HEADLESS}"
                WEB_SCRAPER_LOCALE: "${WEB_SCRAPER_LOCALE}"
                WEB_SCRAPER_TIMEZONE: "${WEB_SCRAPER_TIMEZONE}"
                WEB_SCRAPER_PER_DOMAIN_DELAY_SECONDS: "${WEB_SCRAPER_PER_DOMAIN_DELAY_SECONDS}"
                WEB_SCRAPER_MAX_CONTEXTS: "${WEB_SCRAPER_MAX_CONTEXTS}"
                WEB_SCRAPER_STEALTH_ENABLED: "${WEB_SCRAPER_STEALTH_ENABLED}"
                MCP_MAX_RESPONSE_CHARS: "${MCP_MAX_RESPONSE_CHARS}"
                MCP_LOG_LEVEL: "${MCP_LOG_LEVEL}"
                MCP_LOG_FILE: "${MCP_LOG_FILE}"
            - tool_type: builtin-group
              group_name: "artifact_management"
          session_service:
            type: "memory"
            default_behavior: "PERSISTENT"
          artifact_service:
            type: ${ARTIFACT_SERVICE_TYPE, s3}
            bucket_name: ${S3_BUCKET_NAME}
            endpoint_url: ${S3_ENDPOINT_URL}
            aws_region: ${AWS_REGION, us-east-1}
            artifact_scope: namespace
          artifact_handling_mode: reference
          enable_embed_resolution: ${ENABLE_EMBED_RESOLUTION, true}
          enable_artifact_content_instruction: ${ENABLE_ARTIFACT_CONTENT_INSTRUCTION, true}
          agent_card:
            description: >
              Headless browser agent for accessing bot-protected web content.
              Use when HTTP-based tools fail with 403, CAPTCHA, JavaScript
              challenges, or empty responses. Fetches fully rendered HTML from
              protected sites (Cloudflare, Akamai), downloads images by URL or
              search query, downloads files of any type (PDF, Excel, Word,
              video, archives, up to 50 MB), and takes screenshots of pages
              or specific elements. Bypasses CORS, CSP, and CDN restrictions
              using stealth browser techniques. Returns structured errors with
              error codes and retry guidance. Hard limit: 3 tool calls per
              request for fast response times.
            defaultInputModes: ["text"]
            defaultOutputModes: ["text", "file", "image"]
            skills:
              - id: "fetch_protected_webpage"
                name: "Fetch Protected Webpage"
                description: >
                  Fetch fully rendered HTML from bot-protected websites.
                  Bypasses Cloudflare, Akamai, and JavaScript challenges.
                  Returns complete DOM after JS execution. Supports optional
                  CSS selector wait and configurable timeout.
              - id: "download_product_image"
                name: "Download Image from URL"
                description: >
                  Download the main image from a page URL. Extracts images
                  using og:image, Schema.org, CSS selectors, and size
                  heuristics. Supports PNG, JPG, and WebP output with
                  configurable max width.
              - id: "search_and_download_image"
                name: "Search and Download Image"
                description: >
                  Search for an image by name or identifier and download
                  the best match from Google or Bing Images. Use when no
                  direct URL is available. Supports preferred source domains
                  for prioritized selection.
              - id: "download_file"
                name: "Download File"
                description: >
                  Download any file from a URL. Supports PDFs, Excel, Word,
                  videos, images, archives, and all other file types. Bypasses
                  bot protection, CORS, and CDN restrictions. Max 50 MB.
              - id: "screenshot_webpage"
                name: "Screenshot Webpage"
                description: >
                  Take a screenshot of a webpage or specific element via CSS
                  selector. Supports full-page and viewport captures. Use as
                  fallback when no individual resource can be extracted, or
                  for visual verification.
              - id: "artifact_management"
                name: "Artifact Management"
                description: "List, read, create, update, and delete artifacts."
          agent_card_publishing: { interval_seconds: 10 }
          agent_discovery: { enabled: true }
          inter_agent_communication:
            allow_list: ["*"]
            request_timeout_seconds: 60
