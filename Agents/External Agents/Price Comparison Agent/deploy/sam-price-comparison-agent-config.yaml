apiVersion: v1
kind: ConfigMap
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-price-comparison-agent-config
data:
  price_comparison_agent.yaml: |
    log:
      stdout_log_level: INFO
      log_file_level: DEBUG
      log_file: price_comparison_agent.log

    apps:
      - name: price_comparison_agent_app
        app_base_path: .
        app_module: solace_agent_mesh.agent.sac.app
        broker:
          dev_mode: ${SOLACE_DEV_MODE, false}
          broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
          broker_username: ${SOLACE_BROKER_USERNAME, default}
          broker_password: ${SOLACE_BROKER_PASSWORD, default}
          broker_vpn: ${SOLACE_BROKER_VPN, default}
          temporary_queue: ${USE_TEMPORARY_QUEUES, true}
        app_config:
          namespace: ${NAMESPACE}
          supports_streaming: true
          agent_name: "PriceComparisonAgent"
          display_name: "Price Comparison Agent"
          model:
            model: "${LLM_SERVICE_GENERAL_MODEL_NAME}"
            api_base: "${LLM_SERVICE_ENDPOINT}"
            api_key: "${LLM_SERVICE_API_KEY}"
            timeout: 60
          instruction: |
            You are a price comparison assistant for procurement use cases.
            You ONLY use your own tools. You do NOT call peer agents.

            ## SPEED CONSTRAINT
            You have a 15-second budget per request. Make at most 2 tool
            calls total. Return whatever you have after 2 calls -- partial
            results are acceptable. Never make a 3rd tool call.

            ## CRITICAL RULES
            - Do NOT call any peer agents (no peer_* calls).
            - Do NOT delegate to EAN Search Agent, Web Research Agent,
              WebScraperAgent, Contract DB Agent, or any other agent.
            - Do NOT call find_cheaper_alternatives unless explicitly asked.
            - Do NOT retry more than once on empty results.
            - NEVER invent prices, merchants, or links.

            ## INPUT DETECTION
            EAN: String of exactly 8, 12, 13, or 14 digits (strip spaces/hyphens).
            Product name/description: any other text.
            B2B net-price items (is_b2b_netto=true, "Nettoartikel",
            "Nettoangebotspreise"): skip ALL searches, respond immediately
            with "Nettoartikel -- kein oeffentlicher Preis verfuegbar."

            ## TOOL SELECTION
            - search_product_prices: Default for any price search (EAN or name).
            - batch_search_prices: Multiple products at once.
            - compare_suppliers: Explicit supplier ranking request.
            - find_cheaper_alternatives: Only when explicitly requested.
            - export_comparison_report: Only when CSV export requested.

            ## RESPONSE FORMAT
            - Sort by total price (price + shipping).
            - Highlight cheapest option.
            - Markdown table: Merchant | Price | Shipping | Total | Link.
            - Include price insights (min/max/median/spread) if available.
            - Keep text concise; let tables carry the data.

            ## LANGUAGE
            Respond in the user's language. Default: German.
            Price format: "XX,XX EUR" for German locale.

          tools:
            - tool_type: python
              component_module: "price_comparison_agent.tools"
              tool_config:
                enable_idealo: true
                enable_geizhals: true
                enable_google: true
                max_results_per_source: 5
                request_timeout: 15
                serpapi_key: "${SERPAPI_KEY}"
                scraper_proxy: "${SCRAPER_PROXY}"
                cache_ttl: 300

            - tool_type: builtin-group
              group_name: "artifact_management"

          session_service:
            type: "memory"
            default_behavior: "PERSISTENT"
          artifact_service:
            type: ${ARTIFACT_SERVICE_TYPE, s3}
            bucket_name: ${S3_BUCKET_NAME}
            endpoint_url: ${S3_ENDPOINT_URL}
            aws_region: ${AWS_REGION, us-east-1}
            artifact_scope: namespace
          artifact_handling_mode: reference
          enable_embed_resolution: ${ENABLE_EMBED_RESOLUTION, true}
          enable_artifact_content_instruction: ${ENABLE_ARTIFACT_CONTENT_INSTRUCTION, true}

          agent_card:
            description: >
              Professional price comparison for procurement use cases.
              Real-time price search across Idealo, Geizhals, and Google
              Shopping. Accepts EAN barcodes, product names, or free-text
              descriptions. Returns sorted offers from all available
              merchants including shipping costs, statistical price insights
              (min/max/median/spread), batch price comparisons for tender
              documents, contract-vs-market price analysis, and CSV export
              for award documentation. Supports quantity parameters.
              Detects B2B net-price items and skips price search for those.
            defaultInputModes: ["text"]
            defaultOutputModes: ["text", "file"]
            skills:
              - id: "price_search"
                name: "Product Price Search"
                description: >
                  Search current prices for a product by EAN barcode (8/13
                  digits) or product name. Returns all available offers sorted
                  by total price including shipping, with direct links, price
                  insights (min/max/median/spread), and optional quantity
                  calculation. Provides structured JSON data for other agents.
              - id: "alternative_finder"
                name: "Cheaper Alternative Finder"
                description: >
                  Find cheaper alternative products for a given reference
                  product. Returns alternatives sorted by price with absolute
                  and percentage savings. Supports quantity calculation for
                  total savings on larger orders.
              - id: "supplier_comparison"
                name: "Supplier Comparison"
                description: >
                  Compare all available merchants for a product. Returns a
                  ranking with unit price, shipping cost, total price,
                  delivery time, price insights, and direct links. Supports
                  quantity calculation.
              - id: "batch_search"
                name: "Batch Price Search"
                description: >
                  Search multiple products simultaneously - ideal for tender
                  documents (Leistungsverzeichnisse) and RFQs. Accepts comma-
                  or line-separated lists with optional quantity and position
                  label. Returns total cost overview.
              - id: "contract_price_comparison"
                name: "Contract Price vs. Market"
                description: >
                  Check a contract price against current market prices. Detects
                  renegotiation needs and evaluates whether contract terms are
                  still competitive. Can be combined with contract prices from
                  the Contract DB Agent.
              - id: "export_report"
                name: "CSV Export Report"
                description: >
                  Export a price comparison as a structured CSV report. Ideal
                  for award memos (Vergabevermerke), offer comparisons, and
                  procurement documentation.
          agent_card_publishing: { interval_seconds: 10 }
          agent_discovery: { enabled: false }
          inter_agent_communication:
            allow_list: []
            request_timeout_seconds: 15
