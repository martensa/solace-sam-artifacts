apiVersion: v1
kind: Secret
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-web-research-agent-secret
type: Opaque
stringData:
  # Must match your cluster / existing agent envs
  NAMESPACE: "sam-ent-k8s"

  # ---------------------------------------------------------------------------
  # Artifact storage (S3-compatible)
  # ---------------------------------------------------------------------------
  S3_BUCKET_NAME: "sam-ent-k8s"
  S3_ENDPOINT_URL: "http://agent-mesh-seaweedfs-0.agent-mesh-seaweedfs.sam-ent-k8s.svc.cluster.local:8333"
  AWS_ACCESS_KEY_ID: "sam-ent-k8s"
  AWS_SECRET_ACCESS_KEY: "sam-ent-k8s"
  AWS_REGION: "us-east-1"

  # ---------------------------------------------------------------------------
  # LLM configuration
  # Supported via LiteLLM proxy -- set model name with provider prefix.
  # This agent uses Opus for research quality (not the default Sonnet).
  # Recommended:
  #   Claude / Gemini: ENABLE_EMBED_RESOLUTION=true  (large context, fast)
  #   GPT-4o / GPT-5:  ENABLE_EMBED_RESOLUTION=false (reduce prompt size)
  # ---------------------------------------------------------------------------
  LLM_SERVICE_ENDPOINT: "https://lite-llm.mymaas.net"
  LLM_SERVICE_API_KEY: "sk-cFW9MYGP60mUCvQI6TzMrQ"
  LLM_SERVICE_GENERAL_MODEL_NAME: "openai/claude-opus-4-6"

  # Artifact content injection into LLM context.
  # Recommended: true for Claude/Gemini, false for GPT (avoids prompt timeouts).
  ENABLE_EMBED_RESOLUTION: "true"
  ENABLE_ARTIFACT_CONTENT_INSTRUCTION: "true"

  # ---------------------------------------------------------------------------
  # Solace Event Broker
  # ---------------------------------------------------------------------------
  SOLACE_BROKER_URL: "ws://host.docker.internal:8008"
  SOLACE_BROKER_VPN: "sam"
  SOLACE_BROKER_USERNAME: "default"
  SOLACE_BROKER_PASSWORD: "default"
  SOLACE_DEV_MODE: "false"

  # ---------------------------------------------------------------------------
  # SearXNG meta-search engine
  # This agent uses SearXNG as its primary search backend. The URL is injected
  # into the agent instruction via ${SEARXNG_URL} variable substitution.
  # Adjust this value when deploying to a different environment.
  # ---------------------------------------------------------------------------
  SEARXNG_URL: "http://searxng.sam-ent-k8s.svc.cluster.local:8080"
