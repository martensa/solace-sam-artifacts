apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-web-research-agent
  namespace: sam-ent-k8s-agents
  labels:
    app: sam-external-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sam-external-agents
  template:
    metadata:
      labels:
        app: sam-external-agents
    spec:
      containers:
      - name: sam-web-research-agent
        image: localhost:5000/solace-agent-mesh-enterprise:1.97.2
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        workingDir: /app
        command: ["solace-agent-mesh", "run"]
        args:
        - "configs/agents/web_research_agent.yaml"
        envFrom:
        - secretRef:
            name: sam-web-research-agent-secret
        volumeMounts:
        - name: config-volume
          mountPath: /app/configs
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: config-volume
        configMap:
          name: sam-web-research-agent-config
          items:
          - key: web_research_agent.yaml
            path: agents/web_research_agent.yaml
      imagePullSecrets:
      - name: localhost-registry
