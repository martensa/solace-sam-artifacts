apiVersion: v1
kind: Secret
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-article-verification-agent-secret
type: Opaque
stringData:
  # Must match your cluster / existing agent envs
  NAMESPACE: "sam-ent-k8s"

  # ---------------------------------------------------------------------------
  # Artifact storage (S3-compatible -- SeaweedFS)
  # ---------------------------------------------------------------------------
  S3_BUCKET_NAME: "sam-ent-k8s"
  S3_ENDPOINT_URL: "http://agent-mesh-seaweedfs-0.agent-mesh-seaweedfs.sam-ent-k8s.svc.cluster.local:8333"
  AWS_ACCESS_KEY_ID: "sam-ent-k8s"
  AWS_SECRET_ACCESS_KEY: "sam-ent-k8s"
  AWS_REGION: "us-east-1"

  # ---------------------------------------------------------------------------
  # LLM configuration (via LiteLLM proxy)
  # ---------------------------------------------------------------------------
  LLM_SERVICE_ENDPOINT: "https://lite-llm.mymaas.net"
  LLM_SERVICE_API_KEY: "sk-cFW9MYGP60mUCvQI6TzMrQ"
  LLM_SERVICE_GENERAL_MODEL_NAME: "openai/claude-sonnet-4-6"

  ENABLE_EMBED_RESOLUTION: "true"
  ENABLE_ARTIFACT_CONTENT_INSTRUCTION: "true"

  # ---------------------------------------------------------------------------
  # Solace Event Broker
  # ---------------------------------------------------------------------------
  SOLACE_BROKER_URL: "ws://host.docker.internal:8008"
  SOLACE_BROKER_VPN: "sam"
  SOLACE_BROKER_USERNAME: "default"
  SOLACE_BROKER_PASSWORD: "default"
  SOLACE_DEV_MODE: "false"

  # ---------------------------------------------------------------------------
  # MCP server configuration
  # ---------------------------------------------------------------------------
  MCP_LOG_LEVEL: "INFO"
  MCP_LOG_FILE: "article_verification_mcp.log"
