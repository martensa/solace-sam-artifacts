apiVersion: v1
kind: Secret
metadata:
  namespace: sam-ent-k8s-agents
  name: sam-solace-broker-mcp-agent-secret
type: Opaque
stringData:
  # must match your cluster / existing agent envs
  NAMESPACE: "sam-ent-k8s"

  S3_BUCKET_NAME: "sam-ent-local"
  S3_ENDPOINT_URL: "http://agent-mesh-seaweedfs-0.agent-mesh-seaweedfs.sam-ent-k8s.svc.cluster.local:8333"
  AWS_ACCESS_KEY_ID: "sam-ent-local"
  AWS_SECRET_ACCESS_KEY: "sam-ent-local"
  AWS_REGION: "us-east-1"

  LLM_SERVICE_ENDPOINT: "https://lite-llm.mymaas.net"
  LLM_SERVICE_API_KEY: "<Your Lite-LLM API Key>"
  #LLM_SERVICE_GENERAL_MODEL_NAME: "openai/azure-gpt-5"
  LLM_SERVICE_GENERAL_MODEL_NAME: "openai/gemini-2.5-pro"
  #LLM_SERVICE_GENERAL_MODEL_NAME: "openai/claude-3-5-sonnet-v2"

  SOLACE_BROKER_URL: "ws://host.docker.internal:8008"
  SOLACE_BROKER_VPN: "default"
  SOLACE_BROKER_USERNAME: "default"
  SOLACE_BROKER_PASSWORD: "default"

  SOLACE_DEV_MODE: "false"

  # SEMPv2 broker credentials for the MCP server
  SOLACE_SEMPV2_BASE_URL: "http://host.docker.internal:8080"
  SOLACE_SEMPV2_AUTH_METHOD: "basic"
  SOLACE_SEMPV2_USERNAME: "admin"
  SOLACE_SEMPV2_PASSWORD: "admin"

  # Hard character cap on tool responses returned to the LLM.
  # Recommended values per model:
  #   Claude / Gemini: 25000 (fast processing, large context windows)
  #   GPT-5:           10000 (slower processing, keeps synthesis under ~2 min)
  # Default (if unset): 25000
  #MCP_MAX_RESPONSE_CHARS: "10000"
  MCP_LOG_LEVEL: "INFO"
  MCP_LOG_FILE: "solace_broker_mcp_server.log"

  # Artifact content injection into LLM context.
  # When true, artifact content is resolved and embedded into the LLM prompt.
  # Set both to "false" for GPT to reduce prompt size and avoid timeouts
  # on multi-tool flows (health reports, etc.). Default: true.
  # Recommended: true for Claude/Gemini, false for GPT.
  #ENABLE_EMBED_RESOLUTION: "false"
  #ENABLE_ARTIFACT_CONTENT_INSTRUCTION: "false"

  # Path to the single OpenAPI/Swagger spec inside the container
  #OPENAPI_SPEC: "/opt/solace-broker-mcp-server/semp-v2-swagger-monitor.json"
  # To use the config spec instead, swap to:
  OPENAPI_SPEC: "/opt/solace-broker-mcp-server/semp-v2-swagger-config.json"

  # -- Server-side tool filtering (all optional, comma-separated) --
  # Same env var names as the SolaceLabs reference implementation.
  # Exclusion takes precedence if both include and exclude match.
  # Leave blank or omit to register all tools (default).
  #
  # Filter by HTTP method:
  #MCP_API_INCLUDE_METHODS: "GET"
  #MCP_API_EXCLUDE_METHODS: "DELETE,PUT"
  #
  # Filter by OpenAPI tag:
  #MCP_API_INCLUDE_TAGS: ""
  MCP_API_EXCLUDE_TAGS: "deprecated"
  #
  # Filter by path substring:
  #MCP_API_INCLUDE_PATHS: "/msgVpns/"
  #MCP_API_EXCLUDE_PATHS: "/dmrBridges/,/certAuthorities/"
  #
  # Filter by tool name (operationId):
  #MCP_API_INCLUDE_TOOLS: ""
  #MCP_API_EXCLUDE_TOOLS: ""
  #
  # -- GPT-optimised preset --
  # GPT models degrade above ~50 tools. Uncomment below to limit to ~35
  # essential tools. Claude and Gemini handle the full 456 tools fine.
  #MCP_API_INCLUDE_TOOLS: "getMsgVpns,getMsgVpn,getMsgVpnQueues,getMsgVpnQueue,createMsgVpnQueue,updateMsgVpnQueue,deleteMsgVpnQueue,getMsgVpnQueueSubscriptions,createMsgVpnQueueSubscription,deleteMsgVpnQueueSubscription,getMsgVpnClientProfiles,getMsgVpnClientProfile,createMsgVpnClientProfile,updateMsgVpnClientProfile,getMsgVpnClientUsernames,getMsgVpnClientUsername,createMsgVpnClientUsername,updateMsgVpnClientUsername,getMsgVpnAclProfiles,getMsgVpnAclProfile,createMsgVpnAclProfile,updateMsgVpnAclProfile,getMsgVpnAclProfileClientConnectExceptions,createMsgVpnAclProfileClientConnectException,getMsgVpnAclProfilePublishTopicExceptions,createMsgVpnAclProfilePublishTopicException,getMsgVpnAclProfileSubscribeTopicExceptions,createMsgVpnAclProfileSubscribeTopicException,getMsgVpnTopicEndpoints,getMsgVpnTopicEndpoint,createMsgVpnTopicEndpoint,updateMsgVpnTopicEndpoint,deleteMsgVpnTopicEndpoint,getMsgVpnBridges,getMsgVpnBridge"
